# enable zmk studio for realtime keymap updates
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# conf BLE
CONFIG_ZMK_BLE=y
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_BAS=y

# improve the BLE with experimental features
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# enable deep sleep support
# CONFIG_ZMK_SLEEP=y

# the keyboard disconnects from bluetooth.
# uses very little power, but it may take
# a few seconds to reconnect after waking.
# 1.800.000 ms = 30 minutes
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# change BLE power because split parts sometime
# disconnect from another
# CONFIG_BT_CTLR_TX_PWR_PLUS_5=y
